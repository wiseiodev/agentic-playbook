name: cleanup-neon-branch

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
    steps:
      - run: npm i -g neonctl
      - name: Delete Neon branch
        run: |
          BRANCH="${{ github.head_ref }}"
          neonctl branches delete "$BRANCH" --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY" || true
