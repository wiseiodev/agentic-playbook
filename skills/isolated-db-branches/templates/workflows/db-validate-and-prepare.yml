name: db-validate-and-prepare

on:
  push:
    branches: [main]
    paths:
      - '<schema-source-glob>'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: db-migration
  cancel-in-progress: false

jobs:
  validate-and-prepare:
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      CLONE_NAME: migration-validate-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MIGRATION_BOT_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npm i -g neonctl
      - name: Create throwaway Neon branch
        id: clone
        run: |
          neonctl branches create --name "$CLONE_NAME" --parent "${NEON_PARENT_BRANCH:-production}" --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY"
          URL=$(neonctl connection-string "$CLONE_NAME" --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY")
          echo "database_url=$URL" >> "$GITHUB_OUTPUT"
      - name: Generate migration
        env:
          DATABASE_URL: ${{ steps.clone.outputs.database_url }}
        run: pnpm db:generate:ci
      - name: Check migration files
        id: check
        run: |
          if git status --porcelain | grep -q '<migrations-dir>/'; then
            echo "has_migration=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_migration=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply migration to clone
        if: steps.check.outputs.has_migration == 'true'
        env:
          DATABASE_URL: ${{ steps.clone.outputs.database_url }}
        run: pnpm db:migrate
      - name: Create migration PR
        if: steps.check.outputs.has_migration == 'true'
        env:
          GH_TOKEN: ${{ secrets.MIGRATION_BOT_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BRANCH="migrations/auto-${SHORT_SHA}"
          git config user.name "migration-bot"
          git config user.email "migration-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add <migrations-dir>/
          git commit -m "chore(db): auto-generate migration for ${SHORT_SHA}"
          git push origin "$BRANCH"
          gh pr create --title "chore(db): migration for ${SHORT_SHA}" --body "Auto-generated migration validated against a throwaway Neon clone." --label automated-migration --label migration-ready --base main --head "$BRANCH"
          gh pr merge "$BRANCH" --auto --squash
      - name: Cleanup throwaway Neon branch
        if: always()
        run: neonctl branches delete "$CLONE_NAME" --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY" || true
